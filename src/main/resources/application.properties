spring.application.name=progreso2-integracion
server.port=8083

# ── RabbitMQ ─────────────────────────────────────────
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# ── Rutas de archivos (parametrizadas) ───────────────
app.csv.outbox-path=data/outbox
app.csv.file-name=auditoria-citas.csv
app.errors.log-path=data/errors/citas-rechazadas.log

# ── Apache Camel ─────────────────────────────────────
camel.springboot.name=Salud360IntegrationCamel

# ── Jackson: fechas como strings (no timestamps) ─────
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.fail-on-unknown-properties=false
